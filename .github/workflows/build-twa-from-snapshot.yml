name: Build TWA from snapshot

on:
  workflow_dispatch:
    inputs:
      # ── Option A: provide a pre-built snapshot zip URL ──────────────────────
      snapshot_url:
        description: "Direct URL to pwa-snapshot.zip (leave blank to build snapshot here)"
        required: false
        type: string

      # ── Option B: build the snapshot in CI via Docker ───────────────────────
      pwa_url:
        description: "PWA URL — used only when snapshot_url is empty"
        required: false
        type: string

      # ── App metadata ──────────────────────────────────────────────────────────
      app_id:
        description: "Android package ID (e.g. com.example.myapp)"
        required: true
        type: string
      version_name:
        description: "Version name (e.g. 1.0.0)"
        required: false
        default: "1.0.0"
        type: string
      version_code:
        description: "Version code (integer)"
        required: false
        default: "1"
        type: string

# ─────────────────────────────────────────────────────────────────────────────
# Job 0 — resolve / build the snapshot zip
# Outputs snapshot_url = "artifact" (when built here) or the raw URL
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  prepare-snapshot:
    name: Prepare snapshot zip
    runs-on: ubuntu-latest
    outputs:
      snapshot_url: ${{ steps.resolve.outputs.snapshot_url }}

    steps:
      - name: Checkout repo (needed to build Docker image)
        if: ${{ inputs.snapshot_url == '' && inputs.pwa_url != '' }}
        uses: actions/checkout@v4

      - name: Build pwa-snapshot Docker image
        if: ${{ inputs.snapshot_url == '' && inputs.pwa_url != '' }}
        run: docker build -t pwa-snapshot .

      - name: Run pwa-snapshot container
        if: ${{ inputs.snapshot_url == '' && inputs.pwa_url != '' }}
        run: |
          mkdir -p dist
          docker run --rm \
            -e ICON_SIZES="48,72,96,144,192,512" \
            -e VERBOSE="1" \
            -v ${{ github.workspace }}/dist:/output \
            pwa-snapshot ${{ inputs.pwa_url }}
          echo "── Snapshot produced ──"
          ls -lh dist/

      - name: Upload snapshot as workflow artifact
        if: ${{ inputs.snapshot_url == '' && inputs.pwa_url != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: pwa-snapshot-zip
          path: dist/pwa-snapshot.zip
          retention-days: 1

      - name: Resolve final snapshot source
        id: resolve
        run: |
          if [[ -n "${{ inputs.snapshot_url }}" ]]; then
            echo "snapshot_url=${{ inputs.snapshot_url }}" >> $GITHUB_OUTPUT
          else
            echo "snapshot_url=artifact" >> $GITHUB_OUTPUT
          fi

  # ─────────────────────────────────────────────
  # Job 1 — Android TWA (.aab)
  # ─────────────────────────────────────────────
  build-android:
    name: Build Android TWA (.aab)
    runs-on: ubuntu-latest
    needs: prepare-snapshot

    steps:
      - name: Get snapshot (artifact)
        if: ${{ needs.prepare-snapshot.outputs.snapshot_url == 'artifact' }}
        uses: actions/download-artifact@v4
        with:
          name: pwa-snapshot-zip
          path: .

      - name: Get snapshot (URL)
        if: ${{ needs.prepare-snapshot.outputs.snapshot_url != 'artifact' }}
        run: |
          curl -fSL "${{ needs.prepare-snapshot.outputs.snapshot_url }}" \
            -o pwa-snapshot.zip

      - name: Extract snapshot
        run: |
          unzip pwa-snapshot.zip -d snapshot/
          echo "── Snapshot contents ──"
          find snapshot/ -type f | sort

      - name: Read meta.json
        id: meta
        run: |
          echo "name=$(jq -r '.name' snapshot/meta.json)"              >> $GITHUB_OUTPUT
          echo "theme_color=$(jq -r '.themeColor' snapshot/meta.json)" >> $GITHUB_OUTPUT
          echo "start_url=$(jq -r '.startUrl' snapshot/meta.json)"     >> $GITHUB_OUTPUT

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Bubblewrap + serve
        run: npm install -g @bubblewrap/cli serve

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: Serve snapshot locally
        run: |
          serve snapshot/ -p 8765 &
          sleep 2
          curl -sf http://localhost:8765/manifest.json | jq '.name'

      - name: Init Bubblewrap project
        run: |
          mkdir twa-android && cd twa-android
          echo "Y" | bubblewrap init \
            --manifest "http://localhost:8765/manifest.json" \
            --directory . \
            --packageId "${{ inputs.app_id }}" \
            --name "${{ steps.meta.outputs.name }}" \
            --appVersionName "${{ inputs.version_name }}" \
            --appVersionCode "${{ inputs.version_code }}" \
            --signingKeyPath "../keystore.jks" \
            --signingKeyAlias "${{ secrets.KEYSTORE_ALIAS }}" \
            --signingKeyStorePassword "${{ secrets.KEYSTORE_PASSWORD }}" \
            --signingKeyPassword "${{ secrets.KEY_PASSWORD }}" \
            --skipPwaValidation

      - name: Build signed AAB
        working-directory: twa-android
        run: bubblewrap build --skipPwaValidation

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: twa-android/app-release-bundle.aab
          retention-days: 30

  # ─────────────────────────────────────────────
  # Job 2 — iOS (Xcode project zip / .ipa)
  # ─────────────────────────────────────────────
  build-ios:
    name: Build iOS (Xcode project zip)
    runs-on: macos-latest
    needs: prepare-snapshot

    steps:
      - name: Get snapshot (artifact)
        if: ${{ needs.prepare-snapshot.outputs.snapshot_url == 'artifact' }}
        uses: actions/download-artifact@v4
        with:
          name: pwa-snapshot-zip
          path: .

      - name: Get snapshot (URL)
        if: ${{ needs.prepare-snapshot.outputs.snapshot_url != 'artifact' }}
        run: |
          curl -fSL "${{ needs.prepare-snapshot.outputs.snapshot_url }}" \
            -o pwa-snapshot.zip

      - name: Extract snapshot
        run: unzip pwa-snapshot.zip -d snapshot/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install PWABuilder CLI
        run: |
          npm install -g @pwabuilder/cli
          # Verify installation
          which pwabuilder || echo "pwabuilder not found in PATH"
          pwabuilder --version || echo "pwabuilder command failed"

      - name: Install serve
        run: npm install -g serve

      - name: Serve snapshot locally
        run: |
          # Start serve in background
          serve snapshot/ -p 8765 &
          # Wait for server to start
          sleep 3
          # Verify server is running
          curl -sf http://localhost:8765/manifest.json || echo "Failed to serve manifest"

      - name: Generate iOS package
        run: |
          # Use npx to run pwabuilder if global install fails
          npx @pwabuilder/cli package \
            --platform ios \
            --url "http://localhost:8765/manifest.json" \
            --output ./ios-output

      - name: List output directory
        run: |
          echo "Contents of ios-output:"
          ls -la ios-output/ || echo "ios-output directory not found"
          echo "Looking for zip files:"
          find ./ios-output -name "*.zip" 2>/dev/null || echo "No zip files found"

      - name: Find generated zip
        id: find_zip
        run: |
          ZIP=$(find ./ios-output -name "*.zip" | head -1)
          if [[ -z "$ZIP" ]]; then
            echo "Error: No zip file generated"
            echo "Contents of ios-output:"
            find ./ios-output -type f
            exit 1
          fi
          echo "zip_path=$ZIP" >> $GITHUB_OUTPUT
          echo "Found zip: $ZIP"

      - name: Check for Apple certificates
        id: check_certs
        run: |
          if [[ -n "${{ secrets.APPLE_CERTIFICATE_BASE64 }}" ]]; then
            echo "has_certs=true" >> $GITHUB_OUTPUT
          else
            echo "has_certs=false" >> $GITHUB_OUTPUT
          fi

      - name: Import signing certificate
        if: steps.check_certs.outputs.has_certs == 'true'
        run: |
          echo "${{ secrets.APPLE_CERTIFICATE_BASE64 }}" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security import cert.p12 \
            -k ~/Library/Keychains/build.keychain \
            -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/codesign
          security set-keychain-settings ~/Library/Keychains/build.keychain
          security unlock-keychain -p "" ~/Library/Keychains/build.keychain
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: -s -k "" \
            ~/Library/Keychains/build.keychain

      - name: Create ExportOptions.plist
        if: steps.check_certs.outputs.has_certs == 'true'
        run: |
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ secrets.APPLE_BUNDLE_ID }}</key>
              <string>${{ secrets.APPLE_PROVISIONING_PROFILE }}</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Build .ipa
        if: steps.check_certs.outputs.has_certs == 'true'
        run: |
          unzip "${{ steps.find_zip.outputs.zip_path }}" -d ios-xcode
          PROJ=$(find ios-xcode -name "*.xcodeproj" | head -1)
          if [[ -z "$PROJ" ]]; then
            echo "Error: No .xcodeproj found"
            find ios-xcode -type d | head -20
            exit 1
          fi
          echo "Found project: $PROJ"
          
          SCHEME=$(xcodebuild -list -project "$PROJ" \
            | awk '/Schemes:/,0' | sed -n '2p' | xargs)
          if [[ -z "$SCHEME" ]]; then
            echo "Error: No scheme found"
            xcodebuild -list -project "$PROJ"
            exit 1
          fi
          echo "Using scheme: $SCHEME"
          
          # Archive the app
          xcodebuild \
            -project "$PROJ" -scheme "$SCHEME" \
            -configuration Release \
            -archivePath ios-archive.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.APPLE_PROVISIONING_PROFILE }}" \
            CODE_SIGN_IDENTITY="iPhone Distribution"
          
          # Export the archive
          xcodebuild \
            -exportArchive \
            -archivePath ios-archive.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath ./ios-ipa-output

      - name: Upload Xcode project zip
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcode-project
          path: ${{ steps.find_zip.outputs.zip_path }}
          retention-days: 30

      - name: Upload .ipa
        if: steps.check_certs.outputs.has_certs == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ios-ipa-output/*.ipa
          retention-days: 30